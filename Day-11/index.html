<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
        }

        #question {
            font-size: 24px;
            margin-bottom: 25px;
            color: #222;
        }

        .option {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #f1f1f1;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .option:hover {
            background: #667eea;
            color: white;
        }

        .correct {
            background: #28a745 !important;
            color: white;
        }

        .wrong {
            background: #dc3545 !important;
            color: white;
        }

        #next-btn, #restart-btn, #start-btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        #next-btn:hover,
        #restart-btn:hover,
        #start-btn:hover {
            background: #5a67d8;
        }

        .hidden {
            display: none;
        }

        #result-screen h2 {
            margin-bottom: 20px;
            color: #333;
        }

        #score {
            font-size: 30px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>🎯 Quiz App</h1>

        <div id="start-screen">
            <p>Ready to test your knowledge?</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="top-bar">
                <span id="question-count"></span>
                <span id="timer">⏰ 15</span>
            </div>

            <h2 id="question"></h2>
            <div id="options"></div>

            <button id="next-btn" class="hidden">Next Question</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>Quiz Completed! 🎉</h2>
            <p>Your Score:</p>
            <div id="score"></div>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What does HTML stand for?",
                options: [
                    "Hyper Text Markup Language",
                    "Home Tool Markup Language",
                    "Hyperlinks and Text Markup Language",
                    "Hyper Transfer Markup Language"
                ],
                correct: "Hyper Text Markup Language"
            },
            {
                question: "Which language is used for styling websites?",
                options: ["HTML", "JavaScript", "CSS", "Python"],
                correct: "CSS"
            },
            {
                question: "Which language adds interactivity to web pages?",
                options: ["Java", "C++", "JavaScript", "PHP"],
                correct: "JavaScript"
            },
            {
                question: "Which company developed JavaScript?",
                options: ["Microsoft", "Google", "Netscape", "Apple"],
                correct: "Netscape"
            },
            {
                question: "Inside which tag do we write JavaScript?",
                options: ["<script>", "<js>", "<javascript>", "<code>"],
                correct: "<script>"
            }
        ];

        const startScreen = document.getElementById("start-screen");
        const quizScreen = document.getElementById("quiz-screen");
        const resultScreen = document.getElementById("result-screen");

        const startBtn = document.getElementById("start-btn");
        const nextBtn = document.getElementById("next-btn");
        const restartBtn = document.getElementById("restart-btn");

        const questionEl = document.getElementById("question");
        const optionsEl = document.getElementById("options");
        const timerEl = document.getElementById("timer");
        const questionCountEl = document.getElementById("question-count");
        const scoreEl = document.getElementById("score");

        let currentQuestion = 0;
        let score = 0;
        let timer;
        let timeLeft = 15;

        startBtn.addEventListener("click", startQuiz);
        nextBtn.addEventListener("click", nextQuestion);
        restartBtn.addEventListener("click", restartQuiz);

        function startQuiz() {
            startScreen.classList.add("hidden");
            quizScreen.classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timer);
            timeLeft = 15;
            timerEl.textContent = `⏰ ${timeLeft}`;

            const currentQuiz = quizData[currentQuestion];
            questionCountEl.textContent = `Question ${currentQuestion + 1}/${quizData.length}`;
            questionEl.textContent = currentQuiz.question;

            optionsEl.innerHTML = "";
            nextBtn.classList.add("hidden");

            currentQuiz.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("option");
                button.addEventListener("click", () => selectAnswer(button, option));
                optionsEl.appendChild(button);
            });

            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `⏰ ${timeLeft}`;

                if (timeLeft === 0) {
                    clearInterval(timer);
                    disableOptions();
                    nextBtn.classList.remove("hidden");
                }
            }, 1000);
        }

        function selectAnswer(selectedButton, selectedOption) {
            clearInterval(timer);

            const correctAnswer = quizData[currentQuestion].correct;
            const buttons = document.querySelectorAll(".option");

            buttons.forEach(button => {
                button.disabled = true;

                if (button.innerText === correctAnswer) {
                    button.classList.add("correct");
                }
            });

            if (selectedOption === correctAnswer) {
                score++;
            } else {
                selectedButton.classList.add("wrong");
            }

            nextBtn.classList.remove("hidden");
        }

        function disableOptions() {
            const correctAnswer = quizData[currentQuestion].correct;
            const buttons = document.querySelectorAll(".option");

            buttons.forEach(button => {
                button.disabled = true;

                if (button.innerText === correctAnswer) {
                    button.classList.add("correct");
                }
            });
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizScreen.classList.add("hidden");
            resultScreen.classList.remove("hidden");
            scoreEl.innerText = `${score} / ${quizData.length}`;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            resultScreen.classList.add("hidden");
            quizScreen.classList.remove("hidden");
            loadQuestion();
        }
    </script>

</body>
</html>
