<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Blog UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5ebe0;
      color:#3d2c2e;
    }

    /* Navbar */
    nav{
      width:100%;
      padding:20px 8%;
      background:#432818;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
    }

    nav h1{
      color:#ffe6a7;
      font-size:30px;
    }

    nav ul{
      display:flex;
      gap:25px;
      list-style:none;
    }

    nav ul li a{
      text-decoration:none;
      color:#fff;
      font-size:17px;
      transition:0.3s;
    }

    nav ul li a:hover{
      color:#ddb892;
    }

    /* Hero Section */
    .hero{
      width:100%;
      height:300px;
      background:linear-gradient(to right,#7f5539,#b08968);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero h2{
      font-size:50px;
      margin-bottom:15px;
    }

    .hero p{
      font-size:18px;
      max-width:700px;
      line-height:1.6;
    }

    /* Blog Section */
    .blog-container{
      width:90%;
      margin:60px auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:30px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.4s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card-content h3{
      margin-bottom:12px;
      color:#7f5539;
      font-size:24px;
    }

    .card-content p{
      line-height:1.6;
      color:#555;
      margin-bottom:20px;
    }

    .btn{
      padding:10px 18px;
      border:none;
      background:#7f5539;
      color:white;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#432818;
    }

    /* Footer */
    footer{
      background:#432818;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:50px;
    }

    @media(max-width:700px){

      .hero h2{
        font-size:35px;
      }

      nav{
        flex-direction:column;
        gap:15px;
      }

      nav ul{
        gap:15px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h1>MyBlog</h1>

    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Articles</a></li>
      <li><a href="#">Trending</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h2>Creative Blog UI</h2>
    <p>
      Explore trending articles, web development tips, design inspiration,
      and modern coding ideas in one beautiful place.
    </p>
  </section>

  <!-- Blog Cards -->
  <section class="blog-container" id="blogContainer"></section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Dynamic Blog UI | Created with HTML CSS JavaScript</p>
  </footer>

  <script>

    // Blog Data
    const blogs = [
      {
        image:"https://images.unsplash.com/photo-1498050108023-c5249f4df085",
        title:"Frontend Development",
        description:"Learn how modern frontend websites are created using HTML, CSS, JavaScript and responsive layouts."
      },

      {
        image:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3",
        title:"UI/UX Design Tips",
        description:"Discover creative UI ideas, typography tricks, spacing techniques and clean layouts for better designs."
      },

      {
        image:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f",
        title:"JavaScript Projects",
        description:"Build interactive projects like quiz apps, dashboards, sliders and dynamic websites using JavaScript."
      },

      {
        image:"https://images.unsplash.com/photo-1515879218367-8466d910aaa4",
        title:"Coding Lifestyle",
        description:"Boost productivity with better coding habits, focus techniques and smart learning strategies."
      }
    ];

    const blogContainer = document.getElementById("blogContainer");

    // Render Blog Cards
    blogs.forEach(blog => {

      blogContainer.innerHTML += `
      
        <div class="card">

          <img src="${blog.image}" alt="blog-image">

          <div class="card-content">

            <h3>${blog.title}</h3>

            <p>${blog.description}</p>

            <button class="btn">Read More</button>

          </div>

        </div>
      `;
    });

  </script>

</body>
</html>
