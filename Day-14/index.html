<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reusable Modal Popup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .open-btn {
            padding: 15px 35px;
            border: none;
            outline: none;
            background: #fff;
            color: #764ba2;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Modal Overlay */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        /* Modal Box */
        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.3s ease;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #000;
            transform: rotate(90deg);
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            background: #764ba2;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #5b3a7e;
        }
    </style>
</head>
<body>

    <button class="open-btn" id="openModal">Open Modal</button>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2>Welcome!</h2>
            <p>
                This is a reusable modal popup built with HTML, CSS, and JavaScript.
                You can open and close it anytime.
            </p>
            <button class="action-btn" id="okBtn">Got It</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const okBtn = document.getElementById('okBtn');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        okBtn.addEventListener('click', closeModal);

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>

</body>
</html>
