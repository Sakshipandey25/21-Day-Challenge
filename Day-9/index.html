<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e0e7ff;
}

/* Container */
.container {
  width: 350px;
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 15px;
}

/* Input */
.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 10px 15px;
  border: none;
  background: #6366f1;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* Result */
.weather {
  margin-top: 15px;
}

.temp {
  font-size: 40px;
  font-weight: bold;
}

.desc {
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌦 Weather App</h2>

  <div class="input-box">
    <input type="text" id="city" placeholder="Enter city...">
    <button onclick="getWeather()">Search</button>
  </div>

  <div class="weather" id="weatherBox"></div>
</div>

<script>
const apiKey = "760d2c557088ff7f4bd590c18f9c390d"; 

async function getWeather() {
  const city = document.getElementById("city").value.trim();

  if (city === "") {
    alert("Enter city name");
    return;
  }

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.cod !== 200) {
      document.getElementById("weatherBox").innerHTML = "City not found ❌";
      return;
    }

    const temp = data.main.temp;
    const desc = data.weather[0].description;

    document.getElementById("weatherBox").innerHTML = `
      <div class="temp">${temp}°C</div>
      <div class="desc">${desc}</div>
    `;
  } catch (error) {
    document.getElementById("weatherBox").innerHTML = "Error fetching data";
  }
}
</script>

</body>
</html>
