<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Slider</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#111;
        font-family:sans-serif;
        flex-direction:column;
        gap:15px;
    }

    .slider{
        position:relative;
    }

    img{
        width:500px;
        height:300px;
        object-fit:cover;
        border-radius:10px;
    }

    button{
        padding:10px 15px;
        border:none;
        background:#222;
        color:white;
        cursor:pointer;
        border-radius:5px;
    }

    .nav{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        background:rgba(0,0,0,0.6);
    }

    .prev{ left:10px; }
    .next{ right:10px; }

    button:hover{
        background:#000;
    }
</style>
</head>

<body>

<div class="slider">
    <img id="slide" src="https://picsum.photos/id/1015/500/300">

    <button class="nav prev" onclick="prev()">❮</button>
    <button class="nav next" onclick="next()">❯</button>
</div>

<button onclick="toggleAuto()" id="autoBtn">Start Auto Slide</button>

<script>
let images = [
    "https://www.shutterstock.com/image-photo/sun-sets-behind-mountain-ranges-600nw-2479236003.jpg",
    "https://media.istockphoto.com/id/485371557/photo/twilight-at-spirit-island.jpg?s=612x612&w=0&k=20&c=FSGliJ4EKFP70Yjpzso0HfRR4WwflC6GKfl4F3Hj7fk=",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/24701-nature-natural-beauty.jpg/1280px-24701-nature-natural-beauty.jpg",
    "https://cdn.pixabay.com/photo/2016/11/21/06/53/beautiful-natural-image-1844362_1280.jpg",
    "https://png.pngtree.com/thumb_back/fh260/background/20240522/pngtree-abstract-cloudy-background-beautiful-natural-streaks-of-sky-and-clouds-red-image_15684333.jpg"
];

let i = 0;
let auto = null;

function show(){
    document.getElementById("slide").src = images[i];
}

function next(){
    i = (i + 1) % images.length;
    show();
}

function prev(){
    i = (i - 1 + images.length) % images.length;
    show();
}

function toggleAuto(){
    let btn = document.getElementById("autoBtn");

    if(auto === null){
        auto = setInterval(next, 3000);
        btn.innerText = "Stop Auto Slide";
    } else {
        clearInterval(auto);
        auto = null;
        btn.innerText = "Start Auto Slide";
    }
}
</script>

</body>
</html>
