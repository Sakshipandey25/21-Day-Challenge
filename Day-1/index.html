<!DOCTYPE html>
<html>
<head>
  <title>Digital Flip Clock</title>

  <!-- Google Font for stylish heading -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      color: #00ffff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    }

    .container {
      padding: 40px 60px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 2px solid rgba(0, 255, 255, 0.5);
    }

    .clock {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .flip {
      position: relative;
      width: 70px;
      height: 90px;
      perspective: 300px;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      line-height: 90px;
      font-size: 45px;
      font-weight: bold;
      color: #ff1500;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      box-shadow: inset 2px 2px 5px rgba(74, 44, 172, 0.2),
                  inset -2px -2px 5px rgba(0,0,0,0.3);
      backface-visibility: hidden;
       font-family: 'Orbitron', sans-serif;
       
    }

    .top {
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .bottom {
      transform: rotateX(180deg);
      border-top: 1px solid rgba(0,0,0,0.2);
    }

    .flip.animate .top {
      animation: flipTop 0.6s forwards;
    }

    .flip.animate .bottom {
      animation: flipBottom 0.6s forwards;
    }
    

    @keyframes flipTop {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flipBottom {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .separator {
      font-size: 40px;
      color: white;
      display: flex;
      align-items: center;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    .ampm {
      margin-left: 10px;
      font-size: 20px;
      color: #00ffff;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>
<body>

<h1>DIGITAL CLOCK</h1>

<div class="container">
  <div class="clock" id="clock"></div>
</div>

<script>
  function createDigit() {
    const flip = document.createElement("div");
    flip.className = "flip";

    flip.innerHTML = `
      <div class="card top">0</div>
      <div class="card bottom">0</div>
    `;

    return flip;
  }

  function createSeparator() {
    const sep = document.createElement("div");
    sep.className = "separator";
    sep.innerText = ":";
    return sep;
  }

  function createAMPM() {
    const span = document.createElement("div");
    span.className = "ampm";
    span.id = "ampm";
    span.innerText = "AM";
    return span;
  }

  const clock = document.getElementById("clock");
  const digits = [];

  // Build layout HH:MM:SS
  for (let i = 0; i < 6; i++) {
    if (i === 2 || i === 4) {
      clock.appendChild(createSeparator());
    }
    const digit = createDigit();
    clock.appendChild(digit);
    digits.push(digit);
  }

  // Add AM/PM
  const ampmEl = createAMPM();
  clock.appendChild(ampmEl);

  function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    let ampm = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;
    hours = hours ? hours : 12; // 0 -> 12

    const time = [
      String(hours).padStart(2, "0"),
      String(now.getMinutes()).padStart(2, "0"),
      String(now.getSeconds()).padStart(2, "0")
    ].join("");

    time.split("").forEach((num, i) => {
      const digit = digits[i];
      const top = digit.querySelector(".top");
      const bottom = digit.querySelector(".bottom");

      if (top.innerText !== num) {
        digit.classList.add("animate");

        setTimeout(() => {
          top.innerText = num;
          bottom.innerText = num;
          digit.classList.remove("animate");
        }, 600);
      }
    });

    document.getElementById("ampm").innerText = ampm;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
