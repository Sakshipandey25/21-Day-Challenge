<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Navbar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #1e1e2f;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2b2b45;
            color: white;
        }

        /* LOGO */
        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        /* MENU */
        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        ul li {
            cursor: pointer;
        }

        /* BUTTON */
        .btn {
            background: #00bcd4;
            border: none;
            padding: 6px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* HAMBURGER */
        .menu-btn {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }

        /* MOBILE */
        @media(max-width:768px) {

            ul {
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: #2b2b45;
                flex-direction: column;
                align-items: center;
                display: none;
            }

            ul.active {
                display: flex;
            }

            .menu-btn {
                display: block;
            }

            .btn {
                display: none;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Navbar</div>

        <div class="menu-btn" onclick="toggleMenu()">☰</div>

        <ul id="menu">
            <li>Home</li>
            <li>About</li>
            <li>Blog</li>
            <li>Contact</li>
            <li>Page</li>
        </ul>

        <button class="btn">Sign Up</button>
    </nav>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
        }
    </script>

</body>

</html>
