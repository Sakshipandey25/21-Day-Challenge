<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Notes App</title>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .notebook {
            width: 100%;
            max-width: 750px;
            background: #fffef7;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }


        .page {
            flex: 1;
            padding: 40px;
            background: repeating-linear-gradient(
                to bottom,
                #fffef7 0px,
                #fffef7 34px,
                #c7d2fe 35px,
                #fffef7 36px
            );
            position: relative;
        }

        .page::before {
            content: "";
            position: absolute;
            left: 35px;
            top: 0;
            width: 2px;
            height: 100%;
            background: #f87171;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: #1f2937;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-size: 1.5rem;
            line-height: 35px;
            font-family: 'Caveat', cursive;
            padding-left: 20px;
            color: #111827;
        }

        textarea::placeholder {
            color: #6b7280;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            margin-left: 20px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .create-btn {
            background: #2563eb;
            color: white;
        }

        .save-btn {
            background: #16a34a;
            color: white;
            display: none;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .saved-notes {
            margin-top: 35px;
        }

        .note {
            background: rgba(255, 255, 255, 0.9);
            border-left: 5px solid #2563eb;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 12px;
            position: relative;
        }

        .note p {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: #111827;
            white-space: pre-wrap;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: #ef4444;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            padding: 0;
            font-size: 1.2rem;
        }

        .empty {
            text-align: center;
            margin-top: 25px;
            color: #6b7280;
            font-family: 'Caveat', cursive;
            font-size: 1.7rem;
        }
    </style>
</head>
<body>

    <div class="notebook">
        

        <div class="page">
            <h1>📒 My Notes</h1>

            <textarea id="noteInput" placeholder="Click 'Create Note' to start writing..." readonly></textarea>

            <div class="buttons">
                <button class="create-btn" onclick="createNote()">Create Note</button>
                <button class="save-btn" id="saveBtn" onclick="saveNote()">Save Note</button>
            </div>

            <div class="saved-notes" id="notesContainer"></div>
            <p class="empty" id="emptyMessage">No notes saved yet.</p>
        </div>
    </div>

    <script>
        const noteInput = document.getElementById("noteInput");
        const saveBtn = document.getElementById("saveBtn");
        const notesContainer = document.getElementById("notesContainer");
        const emptyMessage = document.getElementById("emptyMessage");

        let notes = JSON.parse(localStorage.getItem("notes")) || [];

        function createNote() {
            noteInput.removeAttribute("readonly");
            noteInput.value = "";
            noteInput.focus();
            saveBtn.style.display = "inline-block";
        }

        function saveNote() {
            const text = noteInput.value.trim();

            if (text === "") {
                alert("Write something first!");
                return;
            }

            notes.unshift(text);
            localStorage.setItem("notes", JSON.stringify(notes));

            noteInput.value = "";
            noteInput.setAttribute("readonly", true);
            saveBtn.style.display = "none";

            renderNotes();
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            localStorage.setItem("notes", JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            notesContainer.innerHTML = "";

            if (notes.length === 0) {
                emptyMessage.style.display = "block";
                return;
            }

            emptyMessage.style.display = "none";

            notes.forEach((note, index) => {
                const div = document.createElement("div");
                div.className = "note";

                div.innerHTML = `
                    <p>${note}</p>
                    <button class="delete-btn" onclick="deleteNote(${index})">×</button>
                `;

                notesContainer.appendChild(div);
            });
        }

        renderNotes();
    </script>

</body>
</html>
